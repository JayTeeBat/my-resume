name: build

on:
  push:
    branches: ["**"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Full history: the colophon dates the CV from the last commit that
          # touched resume.json. The default shallow clone fetches one commit,
          # so that lookup would silently fall back to whatever HEAD is and
          # stamp every build with today's date -- wrong, and wrong quietly.
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install dependencies
        run: uv sync --locked

      # Chromium is ~150MB; without this every run re-downloads it.
      - name: Resolve Playwright version
        id: pw
        run: echo "version=$(uv run python -c 'from importlib.metadata import version; print(version(\"playwright\"))')" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: pw-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw.outputs.version }}

      - name: Install Chromium
        # --with-deps installs the system libraries Chromium needs, which the
        # cache does not cover, so it must run on a cache hit too.
        run: uv run playwright install --with-deps chromium

      - name: Validate resume.json
        run: uv run resume validate

      - name: Test
        run: uv run pytest -q

      - name: Build the site
        run: uv run resume site

      - uses: actions/upload-artifact@v4
        with:
          name: resume
          path: dist/
          if-no-files-found: error

      # Only main gets published; every other branch just proves it builds.
      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
